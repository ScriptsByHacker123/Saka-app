name: APK Olusturucu
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gerekli Paketleri Kur
        run: |
          sudo apt update
          # libtinfo5 yerine libtinfo6 ekledik, daha güncel
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: APK'yi Pisir (Build)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          buildozer android debug

      - name: APK'yi Disari Aktar
        uses: actions/upload-artifact@v4
        with:
          name: paketlenmis-apk
          path: bin/*.apk
